---
kind: pipeline
name: default
type: kubernetes

environment:
  APP_NAME: lmr
  PROD_ENV: sas-lmr-prod
  BRANCH_ENV: sas-lmr-branch
  STG_ENV: sas-lmr-stg
  UAT_ENV: sas-lmr-uat
  PRODUCTION_URL: www.landlords-reporting.homeoffice.gov.uk
  IMAGE_URL: quay.io/ukhomeofficedigital
  IMAGE_REPO: lmr
  GIT_REPO: UKHomeOffice/lmr
  HOF_CONFIG: hof-services-config/Landlords_Make_A_Report
  NON_PROD_AVAILABILITY: Mon-Fri 08:00-23:00 Europe/London
  READY_FOR_TEST_DELAY: 20s
  NIGHTLY_E2E_BASE_URL: lmr.internal.uat.sas-notprod.homeoffice.gov.uk

include_default_branch: &include_default_branch
  include:
    - master

include_default_and_feature_branches: &include_default_and_feature_branches
  include:
    - master
    - feature/*

trigger:
  branch:
    <<: *include_default_and_feature_branches

node_image: &node_image
  pull: if-not-exists
  image: node:24.15.0-alpine3.23@sha256:8e2c930fda481a6ec141fe5a88e8c249c69f8102fe98af505f38c081649ea749

linting: &linting
  <<: *node_image
  environment:
    NOTIFY_KEY: USE_MOCK
  commands:
    - yarn run test:lint

unit_tests: &unit_tests
  <<: *node_image
  environment:
    NOTIFY_KEY: USE_MOCK
  commands:
    - yarn run test:unit

sonar_scanner: &sonar_scanner
  pull: always
  image: quay.io/ukhomeofficedigital/sonar-scanner:latest
  commands:
    - sonar-scanner -Dproject.settings=./sonar-project.properties

github_app_token_step: &github_app_token_step
  pull: if-not-exists
  image: alpine:3.21
  volumes:
    - name: dockersock
      path: /root/.dockersock
  commands:
    - apk add --no-cache bash curl jq openssl
    - test -n "$GITHUB_APP_ID" || (echo "Missing GITHUB_APP_ID secret." && exit 1)
    - test -n "$GITHUB_APP_PRIVATE_KEY" || (echo "Missing GITHUB_APP_PRIVATE_KEY secret." && exit 1)
    - test -n "$GITHUB_APP_INSTALLATION_ID" || (echo "Missing GITHUB_APP_INSTALLATION_ID secret." && exit 1)
    - test -n "$OUTPUT_TOKEN_FILE" || (echo "Missing OUTPUT_TOKEN_FILE." && exit 1)
    - bash bin/generate_github_app_token.sh

github_app_token_secrets_ukho: &github_app_token_secrets_ukho
  GITHUB_APP_ID:
    from_secret: hof_ukho_gh_app_id
  GITHUB_APP_PRIVATE_KEY:
    from_secret: hof_ukho_gh_app_pk
  GITHUB_APP_INSTALLATION_ID:
    from_secret: hof_ukho_gh_app_install_id

github_app_token_secrets_hof: &github_app_token_secrets_hof
  GITHUB_APP_ID:
    from_secret: HOF_GH_APP_ID
  GITHUB_APP_PRIVATE_KEY:
    from_secret: HOF_GH_APP_PK
  GITHUB_APP_INSTALLATION_ID:
    from_secret: HOF_GH_APP_INSTALL_ID

clone_repos_step: &clone_repos_step
  image: alpine/git
  volumes:
    - name: dockersock
      path: /root/.dockersock
  commands:
    - test -s "$CLONE_TOKEN_FILE" || (echo "$CLONE_TOKEN_MISSING_MESSAGE" && exit 1)
    - export GITHUB_TOKEN="$(cat "$CLONE_TOKEN_FILE")"
    - git clone https://x-access-token:$${GITHUB_TOKEN}@github.com/UKHomeOfficeForms/hof-services-config.git
    - if [ "${CLONE_REPOS_PRUNE:-false}" = "true" ]; then find hof-services-config/* | grep -v $HOF_CONFIG | grep -v 'infrastructure' | xargs rm -rf; fi
    - rm -f "$CLONE_TOKEN_FILE"

steps:
  - name: generate_github_app_token_for_clone
    <<: *github_app_token_step
    environment:
      <<: *github_app_token_secrets_hof
      OUTPUT_TOKEN_FILE: /root/.dockersock/github_app_token_for_clone.txt
    when:
      branch:
        <<: *include_default_and_feature_branches
      event: [push, pull_request]

  - name: clone_repos
    <<: *clone_repos_step
    environment:
      CLONE_TOKEN_FILE: /root/.dockersock/github_app_token_for_clone.txt
      CLONE_TOKEN_MISSING_MESSAGE: Missing GitHub App token file for clone step.
      CLONE_REPOS_PRUNE: "true"
    when:
      branch:
        <<: *include_default_and_feature_branches
      event: [push, pull_request]
    depends_on:
      - generate_github_app_token_for_clone

  - name: setup
    <<: *node_image
    environment:
      NOTIFY_KEY: USE_MOCK
    commands:
      - yarn install --frozen-lockfile
      - yarn run postinstall
    when:
      branch:
        <<: *include_default_and_feature_branches
      event: [push, pull_request]

  - name: linting
    <<: *linting
    when:
      branch:
        <<: *include_default_and_feature_branches
      event: [push, pull_request]
    depends_on:
      - setup
      - clone_repos

  - name: unit_tests
    <<: *unit_tests
    when:
      branch:
        <<: *include_default_and_feature_branches
      event: [push, pull_request]
    depends_on:
      - setup

  - name: sonar_scanner
    <<: *sonar_scanner
    when:
      branch:
        <<: *include_default_and_feature_branches
      event: [push, pull_request]

  - name: build_image
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/dind
    environment:
      DOCKER_PASSWORD:
        from_secret: DOCKER_PASSWORD
    commands:
      # wait for docker service to be up before running docker build
      - /usr/local/bin/wait
      - docker build --no-cache -t $${IMAGE_REPO}:$${DRONE_COMMIT_SHA} .
    volumes:
      - name: dockersock
        path: /var/run
    when:
      branch:
        <<: *include_default_and_feature_branches
      event: [push, pull_request]
    depends_on:
      - linting
      - unit_tests

  # Trivy Security Scannner for scanning OS related vulnerabilities in Base image of Dockerfile
  - name: scan_base_image_os
    pull: always
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/trivy/client:latest
    resources:
      limits:
        cpu: 1000
        memory: 1024Mi
    environment:
      IMAGE_NAME: node:24.15.0-alpine3.23@sha256:8e2c930fda481a6ec141fe5a88e8c249c69f8102fe98af505f38c081649ea749
      SERVICE_URL: https://acp-trivy-helm.acp-trivy.svc.cluster.local:443
      SEVERITY: MEDIUM,HIGH,CRITICAL  --dependency-tree
      FAIL_ON_DETECTION: false
      IGNORE_UNFIXED: false
      ALLOW_CVE_LIST_FILE: hof-services-config/infrastructure/trivy/.trivyignore.yaml
    volumes:
      - name: dockersock
        path: /root/.dockersock
    when:
      event: [push, pull_request]
    depends_on:
      - clone_repos  

  - name: image_to_quay
    pull: if-not-exists
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/dind
    environment:
      DOCKER_PASSWORD:
        from_secret: DOCKER_PASSWORD
    commands:
    - docker login -u="ukhomeofficedigital+lmr" -p=$${DOCKER_PASSWORD} quay.io
    - docker tag $${IMAGE_REPO}:$${DRONE_COMMIT_SHA} $${IMAGE_URL}/$${IMAGE_REPO}:$${DRONE_COMMIT_SHA}
    - docker push $${IMAGE_URL}/$${IMAGE_REPO}:$${DRONE_COMMIT_SHA}
    when:
      branch:
        <<: *include_default_and_feature_branches
      event: [push, pull_request]
    depends_on:
      - build_image

  # Trivy Security Scannner for scanning nodejs packages in Yarn
  - name: scan_node_packages
    pull: always
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/trivy/client:latest
    resources:
      limits:
        cpu: 1000
        memory: 1024Mi
    environment:
      IMAGE_NAME: lmr:${DRONE_COMMIT_SHA}
      SEVERITY: MEDIUM,HIGH,CRITICAL  --dependency-tree --format table
      FAIL_ON_DETECTION: false
      IGNORE_UNFIXED: false
      ALLOW_CVE_LIST_FILE: hof-services-config/infrastructure/trivy/.trivyignore.yaml
    volumes:
      - name: dockersock
        path: /root/.dockersock
    when:
      event: [push, pull_request]
    depends_on:
      - build_image
      - clone_repos


  # Deploy to pull request Branch environment
  - name: deploy_to_branch
    pull: if-not-exists
    image: quay.io/ukhomeofficedigital/kd:v1.14.0
    environment:
      KUBE_SERVER:
        from_secret: kube_server_dev
      KUBE_TOKEN:
        from_secret: kube_token_dev
    volumes:
      - name: dockersock
        path: /root/.dockersock
    commands:
      - bin/deploy.sh $${BRANCH_ENV}
    when:
      branch:
        <<: *include_default_and_feature_branches
      event: pull_request
    depends_on:
      - clone_repos
      - image_to_quay

  # Run playwright tests against the pull request branch environment
  - name: e2e_tests
    pull: if-not-exists
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    volumes:
      - name: dockersock
        path: /root/.dockersock
    commands:
      - yarn install --frozen-lockfile
      - yarn playwright install --with-deps
      - test -s /root/.dockersock/branch_url.txt || (echo "Missing deployed branch URL at /root/.dockersock/branch_url.txt" && exit 1)
      - CI=true PLAYWRIGHT_BASE_URL="https://$(cat /root/.dockersock/branch_url.txt)" yarn test:e2e
    when:
      branch:
        <<: *include_default_and_feature_branches
      event: pull_request
    depends_on:
      - deploy_to_branch

  # Generate short-lived GitHub App installation token for report publishing
  - name: generate_github_app_token
    <<: *github_app_token_step
    environment:
      <<: *github_app_token_secrets_ukho
      OUTPUT_TOKEN_FILE: /root/.dockersock/github_app_token.txt
    when:
      branch:
        <<: *include_default_and_feature_branches
      event: pull_request
    depends_on:
      - e2e_tests

  # Upload Playwright HTML report for PR and comment a download link
  - name: publish_e2e_report_to_pr
    pull: if-not-exists
    image: alpine:3.21
    volumes:
      - name: dockersock
        path: /root/.dockersock
    commands:
      - apk add --no-cache bash curl jq zip
      - test -n "$DRONE_PULL_REQUEST" || (echo "Missing DRONE_PULL_REQUEST. This step only supports pull_request builds." && exit 1)
      - export DRONE_REPO="$${DRONE_REPO:-$GIT_REPO}"
      - test -n "$DRONE_REPO" || (echo "Missing repository slug (DRONE_REPO/GIT_REPO)." && exit 1)
      - test -s /root/.dockersock/github_app_token.txt || (echo "Missing GitHub App token file from generate_github_app_token step." && exit 1)
      - export GITHUB_APP_TOKEN="$(cat /root/.dockersock/github_app_token.txt)"
      - bash bin/publish_e2e_test_report.sh
      - rm -f /root/.dockersock/github_app_token.txt
    when:
      branch:
        <<: *include_default_and_feature_branches
      event: pull_request
    depends_on:
      - generate_github_app_token

# Deploy to master UAT environment
  - name: deploy_to_uat
    pull: if-not-exists
    image: quay.io/ukhomeofficedigital/kd:v1.14.0
    environment:
      KUBE_SERVER:
        from_secret: kube_server_dev
      KUBE_TOKEN:
        from_secret: kube_token_dev
    commands:
      - bin/deploy.sh $${UAT_ENV}
    when:
      branch:
        <<: *include_default_branch
      event: push
    depends_on:
      - clone_repos
      - image_to_quay

  # Deploy to master STG environment
  - name: deploy_to_stg
    pull: if-not-exists
    image: quay.io/ukhomeofficedigital/kd:v1.14.0
    environment:
      KUBE_SERVER:
        from_secret: kube_server_prod
      KUBE_TOKEN:
        from_secret: kube_token_prod
    commands:
      - bin/deploy.sh $${STG_ENV}
    when:
      branch:
        <<: *include_default_branch
      event: push
    depends_on:
      - clone_repos
      - image_to_quay

  # Get pull request branch so correct PR UAT environment is torn down in the tear_down_branch step that follows
  - name: get_pr_branch
    pull: if-not-exists
    image: drone/cli:alpine@sha256:14409f7f7247befb9dd2effdb2f61ac40d1f5fbfb1a80566cf6f2f8d21f3be11
    environment:
      DRONE_SERVER:
        from_secret: drone_server
      DRONE_TOKEN:
        from_secret: drone_token
    volumes:
      - name: dockersock
        path: /root/.dockersock
    commands:
      - drone build info $GIT_REPO $DRONE_BUILD_NUMBER --format {{.Message}} | grep -o '[^ ]\+$' -m1 | sed 's|UKHomeOffice/||g' | tr '[:upper:]' '[:lower:]' | tr '/' '-' > /root/.dockersock/branch_name.txt
    when:
      branch:
        <<: *include_default_branch
      event: push

  # Tear down pull request UAT environment
  - name: tear_down_branch
    pull: if-not-exists
    image: quay.io/ukhomeofficedigital/kd:v1.14.0
    environment:
      KUBE_SERVER:
        from_secret: kube_server_dev
      KUBE_TOKEN:
        from_secret: kube_token_dev
    volumes:
      - name: dockersock
        path: /root/.dockersock
    commands:
      - bin/deploy.sh tear_down
    when:
      branch:
        <<: *include_default_branch
      event: push
    depends_on:
      - get_pr_branch
      - deploy_to_uat

  # Checks a build being promoted has passed, is on master which effectively means a healthy build on Staging
  - name: sanity_check_build_prod
    pull: if-not-exists
    image: drone/cli:alpine@sha256:14409f7f7247befb9dd2effdb2f61ac40d1f5fbfb1a80566cf6f2f8d21f3be11
    environment:
      DRONE_SERVER:
        from_secret: drone_server
      DRONE_TOKEN:
        from_secret: drone_token
    commands:
      - bin/sanity_check_build.sh
    when:
      target: PROD
      event: promote

  - name: generate_github_app_token_for_clone_prod
    <<: *github_app_token_step
    environment:
      <<: *github_app_token_secrets_hof
      OUTPUT_TOKEN_FILE: /root/.dockersock/github_app_token_for_clone_prod.txt
    when:
      target: PROD
      event: promote
    depends_on:
      - sanity_check_build_prod

  - name: clone_repos_prod
    <<: *clone_repos_step
    environment:
      CLONE_TOKEN_FILE: /root/.dockersock/github_app_token_for_clone_prod.txt
      CLONE_TOKEN_MISSING_MESSAGE: Missing GitHub App token file for PROD clone step.
    when:
      target: PROD
      event: promote
    depends_on:
      - generate_github_app_token_for_clone_prod

  # Deploy to Production environment
  - name: deploy_to_prod
    pull: if-not-exists
    image: quay.io/ukhomeofficedigital/kd:v1.14.0
    environment:
      KUBE_SERVER:
        from_secret: kube_server_prod
      KUBE_TOKEN:
        from_secret: kube_token_prod
    commands:
      - bin/deploy.sh $${PROD_ENV}
    when:
      target: PROD
      event: promote
    depends_on:
      - clone_repos_prod

  # CRON job step that tears down our pull request UAT environments
  - name: cron_tear_down
    pull: if-not-exists
    image: quay.io/ukhomeofficedigital/kd:v1.14.0
    environment:
      KUBE_SERVER:
        from_secret: kube_server_dev
      KUBE_TOKEN:
        from_secret: kube_token_dev
    commands:
      - bin/clean_up.sh $${BRANCH_ENV}
    when:
      cron: tear_down_pr_envs
      event: cron

  # # CRON job steps that runs security scans using Snyk & Trivy
  - name: generate_github_app_token_for_clone_cron
    <<: *github_app_token_step
    environment:
      <<: *github_app_token_secrets_hof
      OUTPUT_TOKEN_FILE: /root/.dockersock/github_app_token_for_clone_cron.txt
    when:
      cron: security_scans
      event: cron

  # CRON job steps that runs security scans using Trivy
  - name: cron_clone_repos
    <<: *clone_repos_step
    environment:
      CLONE_TOKEN_FILE: /root/.dockersock/github_app_token_for_clone_cron.txt
      CLONE_TOKEN_MISSING_MESSAGE: Missing GitHub App token file for CRON clone step.
    when:
      cron: security_scans
      event: cron
    depends_on:
      - generate_github_app_token_for_clone_cron
      
  - name: cron_build_image
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/dind
    commands:
      # wait for docker service to be up before running docker build
      - /usr/local/bin/wait
      - docker build --no-cache -t $${IMAGE_REPO}:$${DRONE_COMMIT_SHA} .
    volumes:
      - name: dockersock
        path: /var/run
    when:
      cron: security_scans
      event: cron

  - name: cron_trivy_scan_image_os
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/trivy/client:latest
    pull: always
    environment:
        IMAGE_NAME: node:24.15.0-alpine3.23@sha256:8e2c930fda481a6ec141fe5a88e8c249c69f8102fe98af505f38c081649ea749
        SEVERITY: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL --dependency-tree
        FAIL_ON_DETECTION: true
        IGNORE_UNFIXED: false
        ALLOW_CVE_LIST_FILE: hof-services-config/infrastructure/trivy/.trivyignore.yaml
    when:
      cron: security_scans
      event: cron
    depends_on:
      - cron_clone_repos
      
  - name: cron_trivy_scan_node_packages
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/trivy/client:latest
    pull: always
    environment:
      IMAGE_NAME: lmr:${DRONE_COMMIT_SHA}
      SEVERITY: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL --dependency-tree
      FAIL_ON_DETECTION: true
      IGNORE_UNFIXED: false
      ALLOW_CVE_LIST_FILE: hof-services-config/infrastructure/trivy/.trivyignore.yaml
    when:
      cron: security_scans
      event: cron
      status:
        - success
        - failure
    depends_on:
      - cron_build_image
      - cron_clone_repos

  # Slack notification upon a CRON job fail
  - name: cron_notify_slack_tear_down_pr_envs
    pull: if-not-exists
    image: plugins/slack:1.4.1
    settings:
      channel: sas-hof-build-notify
      failure: ignore
      icon.url: https://readme.drone.io/logo.svg
      template: >
            *✘ {{ uppercasefirst build.status }}*: CRON Job `tear_down_pr_envs` for *Landlords Make A Report* has failed.

            Branch <https://github.com/{{ repo.owner }}/{{ repo.name }}/commits/{{ build.branch }}|{{build.branch}}> | Commit <https://github.com/{{ repo.owner }}/{{ repo.name }}/commit/{{ build.commit }}|{{ truncate build.commit 8 }}>

            *Build <{{build.link}}|#{{build.number}}>*
      username: Drone_CI
      webhook:
        from_secret: slack_sas_hof_build_notify_webhook
    when:
      cron: tear_down_pr_envs
      event: cron
      status:
        - failure
    depends_on:
      - cron_tear_down

  - name: cron_notify_slack_security_scans
    pull: if-not-exists
    image: plugins/slack:1.4.1
    settings:
      channel: sas-hof-security
      failure: ignore
      icon.url: https://readme.drone.io/logo.svg
      template: >
            *✘ {{ uppercasefirst build.status }}*: CRON Job `security_scans` for *Landlords Make A Report* has failed.

            Branch <https://github.com/{{ repo.owner }}/{{ repo.name }}/commits/{{ build.branch }}|{{build.branch}}> | Commit <https://github.com/{{ repo.owner }}/{{ repo.name }}/commit/{{ build.commit }}|{{ truncate build.commit 8 }}>

            *Build <{{build.link}}|#{{build.number}}>*
      username: Drone_CI
      webhook:
        from_secret: slack_sas_hof_security_webhook
    when:
      cron: security_scans
      event: cron
      status:
        - failure
    depends_on:
      - cron_trivy_scan_image_os
      - cron_trivy_scan_node_packages

  # CRON job step that runs nightly Playwright E2E tests against a fixed environment
  - name: cron_nightly_e2e_tests
    pull: if-not-exists
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    volumes:
      - name: dockersock
        path: /root/.dockersock
    commands:
      - yarn install --frozen-lockfile
      - yarn playwright install --with-deps
      - test -n "$NIGHTLY_E2E_BASE_URL" || (echo "Missing NIGHTLY_E2E_BASE_URL environment value." && exit 1)
      - |
        case "$NIGHTLY_E2E_BASE_URL" in
          http://*|https://*) export PLAYWRIGHT_BASE_URL="$NIGHTLY_E2E_BASE_URL" ;;
          *) export PLAYWRIGHT_BASE_URL="https://$NIGHTLY_E2E_BASE_URL" ;;
        esac
        echo "Using PLAYWRIGHT_BASE_URL=$PLAYWRIGHT_BASE_URL"
      - export PLAYWRIGHT_RUN_OUTPUT_PATH=/root/.dockersock/nightly-playwright-run-output.txt
      - export PLAYWRIGHT_TEXT_SUMMARY_PATH=/root/.dockersock/nightly-playwright-summary.txt
      - rm -f "$PLAYWRIGHT_RUN_OUTPUT_PATH" "$PLAYWRIGHT_TEXT_SUMMARY_PATH"
      - yarn bddgen
      - set +e
      - yarn playwright test --reporter=line > "$PLAYWRIGHT_RUN_OUTPUT_PATH" 2>&1
      - PLAYWRIGHT_EXIT_CODE=$?
      - set -e
      - tail -n 60 "$PLAYWRIGHT_RUN_OUTPUT_PATH" || true
      - node bin/summarise_playwright_report.js "$PLAYWRIGHT_RUN_OUTPUT_PATH" "$PLAYWRIGHT_TEXT_SUMMARY_PATH"
      - exit "$PLAYWRIGHT_EXIT_CODE"
    when:
      cron: nightly_e2e_playwright
      event: cron

  # Slack notification for nightly E2E cron runs
  - name: cron_notify_slack_nightly_e2e
    pull: if-not-exists
    image: alpine:3.21
    environment:
      SLACK_WEBHOOK:
        from_secret: slack_sas_hof_e2e_tests_webhook
    volumes:
      - name: dockersock
        path: /root/.dockersock
    commands:
      - apk add --no-cache curl jq
      - test -n "$SLACK_WEBHOOK" || (echo "Missing slack_sas_hof_e2e_tests_webhook secret." && exit 1)
      - test -f /root/.dockersock/nightly-playwright-summary.txt || printf "Playwright Nightly Summary\nSummary artifact missing.\n" > /root/.dockersock/nightly-playwright-summary.txt
      - |
        payload=$(jq -n \
          --arg status "$DRONE_BUILD_STATUS" \
          --arg repo "$DRONE_REPO" \
          --arg branch "$DRONE_BRANCH" \
          --arg commit "$DRONE_COMMIT_SHA" \
          --arg build_number "$DRONE_BUILD_NUMBER" \
          --arg build_link "$DRONE_BUILD_LINK" \
          --rawfile summary /root/.dockersock/nightly-playwright-summary.txt \
          '{
            text: ("Nightly Playwright nightly_e2e_playwright for " + $repo + " finished with status: " + $status),
            blocks: [
              {
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: ("*Nightly Playwright nightly_e2e_playwright*\nStatus: " + $status + "\nBranch: " + $branch + "\nCommit: " + ($commit[0:8]) + "\nBuild: #" + $build_number + " " + $build_link)
                }
              },
              {
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: ("```" + $summary + "```")
                }
              }
            ]
          }')
        http_code=$(curl -sS -o /tmp/slack_response.txt -w "%{http_code}" \
          -X POST \
          -H "Content-type: application/json" \
          --data "$payload" \
          "$SLACK_WEBHOOK")
        echo "Slack webhook HTTP status: $http_code"
        echo "Slack webhook response body:"
        cat /tmp/slack_response.txt
        test "$http_code" = "200" || (echo "Slack webhook call failed" && exit 1)
    when:
      cron: nightly_e2e_playwright
      event: cron
      status:
        - success
        - failure
    depends_on:
      - cron_nightly_e2e_tests

services:
  - name: docker
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/dind

  # Redis session setup in background so integration tests can run
  - name: session
    image: redis
    volumes:
      - name: dockersock
        path: /var/run
volumes:
  - name: dockersock
    temp: {}
