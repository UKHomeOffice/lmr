name: "Yarn CI - Setup, Lint, Unit Tests, Audit"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  resolve_base_image:
    name: Resolve Dockerfile base image
    runs-on: ubuntu-latest
    outputs:
      base_image: ${{ steps.get_base_image.outputs.base_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract base image from Dockerfile
        id: get_base_image
        run: |
          BASE_IMAGE=$(awk 'toupper($1)=="FROM"{print $2; exit}' Dockerfile)
          test -n "$BASE_IMAGE" || (echo "No FROM image found in Dockerfile" && exit 1)
          echo "base_image=$BASE_IMAGE" >> "$GITHUB_OUTPUT"

  setup_lint_unit_tests_audit:
    name: "Setup, Lint, Unit Tests, Audit"
    needs: resolve_base_image
    runs-on: ubuntu-latest
    container: ${{ needs.resolve_base_image.outputs.base_image }}
    env:
      NOTIFY_KEY: USE_MOCK
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run postinstall
        run: yarn run postinstall

      - name: linting
        run: yarn run test:lint

      - name: unit_tests
        run: yarn run test:unit

      - name: Yarn audit (fails only on high or critical)
        run: |
          yarn audit --json > audit.jsonl || true
          node -e "const fs=require('fs');const lines=fs.readFileSync('audit.jsonl','utf8').trim().split(/\n+/).filter(Boolean);let summary=null;for(const line of lines){try{const obj=JSON.parse(line);if(obj.type==='auditSummary'){summary=obj.data;}}catch{}}if(!summary){console.error('Could not parse yarn audit summary');process.exit(1);}const high=Number(summary.vulnerabilities?.high||0);const critical=Number(summary.vulnerabilities?.critical||0);console.log('Audit summary:', summary.vulnerabilities);if(high>0||critical>0){console.error('High/Critical vulnerabilities detected');process.exit(1);}console.log('No high or critical vulnerabilities found.');"

